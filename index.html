<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portifolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!--CABEÇALHO-->
  <!-- - O "header" define o topo do site
       - A "div" define um container ela agruapa elementos
       - O "nav" define a aréa de navegação do site
       - O <a href=""</a> cria links internos 
  -->
  <header class="cabecalho">
    <div class="logo">Recione.dev</div>

    <nav class="navbar">
      <a href="#inicio">Início</a>
      <a href="#sobre">Sobre</a>
      <a href="#tecnologias">Tecnologias</a>
      <a href="#habilidades">Competências</a>
      <a href="#projetos">Projetos</a>
      <a href="#estudos">Estudos</a>
      <a href="#contato">Contato</a>
      
    </nav>
  </header>

<!--PERFIL-->
<!--Esta seção ira criar o inicio do meu portifolio,
    nela sera carregada a foto de perfil, minha profição,
    e os links do meu githu e linkedin, além de uma breve descrição sobre mim -->
<section id="inicio" class="perfil">
  <div class="texto-perfil">

    <img
    src="assets/eu.jpg"
    alt="Foto de Leandro Recione"
    class="foto-perfil" 
    >

    <h1>Leandro Recione</h1>

    <h2 class="cargo">
      Desenvolvedor Backend
    </h2>

    <p>
      Estudante e entusiasta de programação focado em 
      desenvolvimento backend com NestJS, Java e bancos de dados.
    </p>

    <div class="botao-perfil">
      <a 
        href="https://github.com/leandrorecione"
        target="_blank"
        >
          GitHub
      </a>

      <a 
        href="https://www.linkedin.com/in/leandro-recione-5b6567345/"
        target="_blank"
        >
          LinkedIn
      </a>

    </div>
  </div>







  </div>


</section>




















































































































</body>
</html>
